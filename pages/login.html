<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Frank Sinatra</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <section class="auth-container">

        <div class="auth-card">

            <h1>Login</h1>

            <p>
                Entre na experiência Frank Sinatra.
            </p>

            <form id="formLogin">

                <input
                    type="email"
                    id="emailLogin"
                    placeholder="Digite seu email"
                >

                <input
                    type="password"
                    id="senhaLogin"
                    placeholder="Digite sua senha"
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <span id="mensagemLogin"></span>

            <a href="../index.html">
                Voltar para Home
            </a>

        </div>

    </section>

    <script src="../js/login.js"></script>

</body>

</html>
