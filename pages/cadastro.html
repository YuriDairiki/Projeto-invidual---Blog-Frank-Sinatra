<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Frank Sinatra</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <section class="auth-container">

        <div class="auth-card">

            <h1>Cadastro</h1>

            <p>
                Crie sua conta para acessar o universo Sinatra.
            </p>

            <form id="formCadastro">

                <input
                    type="text"
                    id="nomeCadastro"
                    placeholder="Digite seu nome"
                >

                <input
                    type="email"
                    id="emailCadastro"
                    placeholder="Digite seu email"
                >

                <input
                    type="password"
                    id="senhaCadastro"
                    placeholder="Digite sua senha"
                >

                <button type="submit">
                    Criar Conta
                </button>

            </form>

            <span id="mensagemCadastro"></span>

            <a href="../index.html">
                Voltar para Home
            </a>

        </div>

    </section>

<script src="../js/cadastro.js"></script>
</body>

</html>
